<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notorious Squirrel // Linux Terminal</title>

<style>
html, body {
margin:0;
padding:0;
height:100%;
background:#000;
color:#00ff9c;
font-family:monospace;
}

#wrapper{
display:flex;
flex-direction:column;
height:100vh;
padding:10px;
}

#terminal{
flex:1;
overflow-y:auto;
white-space:pre-wrap;
}

#input-line{
display:flex;
gap:5px;
border-top:1px solid #00ff9c;
padding-top:5px;
}

#cmdline{
flex:1;
background:transparent;
border:none;
outline:none;
color:#00ff9c;
font-family:inherit;
}

#nanoOverlay{
position:fixed;
inset:0;
background:#000;
color:#00ff9c;
display:none;
flex-direction:column;
padding:10px;
}

#nanoEditor{
flex:1;
white-space:pre-wrap;
outline:none;
}

#nanoStatus{
background:#003322;
padding:3px;
}

#nanoHelp{
background:#002211;
padding:3px;
}
</style>
</head>

<body>

<div id="wrapper">
<div id="terminal"></div>

<div id="input-line">
<span id="prompt"></span>
<input id="cmdline" autofocus>
</div>
</div>

<div id="nanoOverlay">
<div id="nanoStatus"></div>
<div id="nanoEditor" contenteditable="true"></div>
<div id="nanoHelp">^S Save  ^X Exit</div>
</div>

<script>

/* ================= CONFIG ================= */

const USERNAME="NukemSquirell"
const HOSTNAME="blackwire"

/* ================= REMOTE HOST ================= */

const REMOTE_HOSTS = {
  "192.168.1.23": {
    hostname: "devserver",
    username: "hacker",
    fs: {
      type: "dir",
      children: {

        home: {
          type: "dir",
          children: {
            hacker: {
              type: "dir",
              children: {
                "notes.txt": {
                  type: "file",
                  content: `Backup server credentials rotated.
Old storage moved to /opt/archive`
                }
              }
            }
          }
        },

        opt: {
          type: "dir",
          children: {
            archive: {
              type: "dir",
              children: {
                "flag.txt": {
                  type: "file",
                  content: "FLAG{SSH-PIVOT-COMPLETE}"
                }
              }
            }
          }
        },

        var: {
          type: "dir",
          children: {
            log: {
              type: "dir",
              children: {
                "auth.log": {
                  type: "file",
                  content: "Jan 21 devserver sshd[221]: Accepted password for hacker"
                }
              }
            }
          }
        }

      }
    }
  }
};

/* ================= FILESYSTEM ================= */

const FS_ROOT={
type:"dir",
children:{

home:{
type:"dir",
children:{
notoruss:{
type:"dir",
children:{

"readme.txt":{
type:"file",
content:`Welcome, ${USERNAME}

Explore the system.

Real hackers dig around /opt and /var`
},

"notes.txt":{
type:"file",
content:`Things to do:
- Build Nukem Death Ray
- Hide flags
- Take over the world`
}

}
}
}
},

etc:{
type:"dir",
children:{
issue:{
type:"file",
content:"Notorious OS 1.0"
}
}
},

var:{
type:"dir",
children:{
log:{
type:"dir",
children:{
"auth.log":{
type:"file",
content:"Accepted password for user"
}
}
}
}
},

opt:{
type:"dir",
children:{
ctf:{
type:"dir",
children:{
"flag.txt":{
type:"file",
content:"FLAG{NOTORIOUS-SQUIRREL-TERMINAL-01}"
}
}
}
}

}

}

/* ================= STATE ================= */

let cwd=["home","notoruss"]

let currentHost={
hostname:HOSTNAME,
username:USERNAME,
fs:FS_ROOT
}

let nanoActive=false
let nanoNode=null

/* ================= DOM ================= */

const term=document.getElementById("terminal")
const cmd=document.getElementById("cmdline")
const prompt=document.getElementById("prompt")

const nanoOverlay=document.getElementById("nanoOverlay")
const nanoEditor=document.getElementById("nanoEditor")
const nanoStatus=document.getElementById("nanoStatus")
  
window.onload = () => cmd.focus()

/* ================= HELPERS ================= */

function print(t=""){
term.textContent+=t+"\n"
term.scrollTop=term.scrollHeight
}

function getPath(){
return "/"+cwd.join("/")
}

function updatePrompt(){
prompt.textContent=`${currentHost.username}@${currentHost.hostname}:${getPath()}$ `
}

function resolve(path){

if(!path) return [...cwd]

if(typeof path !== "string") return [...cwd]

if(path.startsWith("/")) return path.split("/").filter(Boolean)

let p=[...cwd]

path.split("/").forEach(x=>{
if(x==="..") p.pop()
else if(x!=="." && x!=="") p.push(x)
})

return p
}

function getNode(path){

let n=currentHost.fs

for(let p of path){
if(!n.children || !n.children[p]) return null
n=n.children[p]
}

return n
}

/* ================= COMMANDS ================= */

function cmd_ls(){

let n=getNode(cwd)

if(!n || !n.children){
print("")
return
}

print(Object.keys(n.children || {}).join("  "))
}

function cmd_cd(a){

let p=resolve(a[0]||"/home/notoruss")

let n=getNode(p)

if(!n||n.type!=="dir"){
print("No such directory")
return
}

cwd=p
}

function cmd_cat(a){

let n=getNode(resolve(a[0]))

if(!n||n.type!=="file"){
print("No such file")
return
}

print(n.content)
}

function cmd_pwd(){
print(getPath())
}

function cmd_help(){
print(`Commands:
ls
cd
cat
pwd
ssh
nano
clear`)
}

function cmd_clear(){
term.textContent=""
}

/* ================= SSH ================= */

function cmd_ssh(a){

if(!a[0]){
print("usage: ssh user@host")
return
}

let [user,host]=a[0].split("@")

if(!REMOTE_HOSTS[host]){
print("Connection refused")
return
}

let r=REMOTE_HOSTS[host]

currentHost={
hostname:r.hostname,
username:user,
fs:r.fs
}

cwd=["home",user]

print(`Connected to ${host}`)
}

/* ================= NANO ================= */

function openNano(file){

let n=getNode(resolve(file))

if(!n||n.type!=="file"){
print("No such file")
return
}

nanoNode=n
nanoEditor.innerText=n.content
nanoOverlay.style.display="flex"
nanoStatus.innerText="Editing "+file
nanoActive=true
}

document.addEventListener("keydown",e=>{

if(!nanoActive)return

if(e.ctrlKey&&e.key==="s"){
nanoNode.content=nanoEditor.innerText
nanoStatus.innerText="Saved"
e.preventDefault()
}

if(e.ctrlKey&&e.key==="x"){
nanoOverlay.style.display="none"
nanoActive=false
setTimeout(()=>cmd.focus(),0)
}

})

/* ================= COMMAND DISPATCH ================= */

function run(line){

let [c,...a]=line.split(" ")

switch(c){

case "ls":cmd_ls();break
case "cd":cmd_cd(a);break
case "cat":cmd_cat(a);break
case "pwd":cmd_pwd();break
case "help":cmd_help();break
case "clear":cmd_clear();break
case "ssh":cmd_ssh(a);break
case "nano":openNano(a[0]);break

default:print("command not found")

}

}

/* ================= INPUT ================= */

cmd.addEventListener("keydown",e=>{

if(e.key==="Enter"){

let i=cmd.value

print(prompt.textContent+i)

run(i)

cmd.value=""

updatePrompt()

}

})

/* =================  ================= */

function init(){

print("NotoriousOS Terminal")
print("Type help")

updatePrompt()

cmd.focus()

}

init()

</script>
</body>
</html>
